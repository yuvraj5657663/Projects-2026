<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>

        <div class="form-section">
            <label for="typeInput">Enter Transaction Title:-</label>
            <input type="text" id="titleInput" placeholder="Enter transaction title">

            <label for="typeInput">Enter Your Amount:-</label>
            <input type="number" id="amountInput" placeholder="Enter amount" min="0.01" step="0.01">

            <label for="fileInput">Choose a file:-</label>
            <input type="file" id="fileInput" accept="image/*,.pdf">
            

            <label for="typeInput">select your type:-</label>
            <select id="typeInput">
                <option value="select">select:-</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <label for="categoryInput">select your category:</label>
            <select id="categoryInput">
                <option value="select">select:-</option>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Salary">Salary</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>

            <button id="addBtn">
                Add Transaction
            </button>

            <button id="cancelEditBtn" class="secondary-btn" type="button" hidden>
                Cancel Edit
            </button>
            
        </div>


        <div class="summary">
            <div class="card">
                <h3>Total Income</h3>
                <p id="income">0</p>
            </div>
            <div class="card">
                <h3>Total Expense</h3>
                <p id="expense">0</p>
            </div>
            <div class="card">
                <h3>Total Balance</h3>
                <p id="balance">0</p>
            </div>
        </div>


        <div class="history">
            <div class="history-header">
                <h2>Transaction History</h2>
                <button id="clearAllBtn" class="delete-btn" type="button">Clear All</button>
            </div>
            <input type="search" id="searchInput" placeholder="Search by title">
            <ul id="transactionList">

            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
